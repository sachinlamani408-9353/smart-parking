<!DOCTYPE html>
<html>

<head>
    <title>Smart Parking System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>🚗 KLE TECHNOLOGICAL UNIVERSITY PARKING AREA</h1>

        <div class="card">
            <h2>Total Slots</h2>
            <p id="total">0</p>
        </div>

        <div class="card">
            <h2>Occupied Slots</h2>
            <p id="occupied">0</p>
        </div>

        <div class="card">
            <h2>Available Slots</h2>
            <p id="available">0</p>
        </div>

        <div id="status">
            Loading...
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
